name: Build

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev qt6-webengine-dev

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release
