name: Build

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libgl1-mesa-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtwebengine qtwebchannel
          cache: true

      - name: Configure
        run: cmake --preset release -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build --preset release
